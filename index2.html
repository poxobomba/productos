<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍚 Azúcar Pro - Local Storage</title>
    <style>
        :root{
            --primary:#4CAF50;--primary-dark:#45a049;
            --danger:#e74c3c;--danger-dark:#c0392b;
            --secondary:#3498db;--secondary-dark:#2980b9;
            --success:#27ae60;--success-dark:#229954;
            --warning:#f39c12;--warning-dark:#e67e22;
            --bg:#f8f9fa;--card:#fff;--text:#2c3e50;--text-muted:#7f8c8d;
            --shadow-sm:0 2px 10px rgba(0,0,0,.1);
            --shadow-md:0 10px 30px rgba(0,0,0,.2);
            --shadow-lg:0 20px 50px rgba(0,0,0,.25);
        }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
        body{background:linear-gradient(135deg,var(--primary) 0%,#764ba2 100%);min-height:100vh;padding:15px}
        .container{max-width:450px;margin:0 auto;background:var(--card);border-radius:28px;box-shadow:var(--shadow-lg);overflow:hidden}
        h1{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;text-align:center;padding:35px;font-size:1.8em;font-weight:800;text-shadow:0 2px 10px rgba(0,0,0,.3)}
        .header-info{padding:20px 25px;background:var(--bg);border-bottom:1px solid #e9ecef;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
        .status{padding:10px 20px;background:var(--primary);color:#fff;border-radius:25px;font-size:.9em;font-weight:600}
        .stats{font-size:.85em;color:var(--text-muted)}
        .precio-actual{padding:45px 30px;text-align:center;border-bottom:1px solid #e9ecef;background:linear-gradient(135deg,#fff 0%,#f8f9ff 100%)}
        .precio{font-size:3.5em;font-weight:900;background:linear-gradient(135deg,var(--danger),var(--danger-dark));-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:none;letter-spacing:-1px}
        .fecha{font-size:1.2em;color:var(--text);margin:15px 0;font-weight:600}
        .tendencia{display:inline-flex;align-items:center;gap:8px;font-size:1em;font-weight:600;margin-top:10px}
        .tendencia.subida{color:var(--success)} .tendencia.baja{color:var(--danger)}
        .formulario{padding:40px;text-align:center;background:var(--card)}
        input{width:100%;max-width:320px;padding:25px;font-size:1.5em;border:3px solid #e9ecef;border-radius:25px;margin-bottom:20px;text-align:center;font-weight:700;box-shadow:var(--shadow-sm);transition:all .3s}
        input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 6px rgba(76,175,80,.15),var(--shadow-md)}
        input::placeholder{font-weight:500;color:var(--text-muted)}
        .botones{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:20px}
        button{padding:20px;font-size:1.2em;font-weight:700;border:none;border-radius:22px;cursor:pointer;box-shadow:var(--shadow-md);transition:all .3s;letter-spacing:.5px}
        .btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff}
        .btn-primary:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
        .btn-secondary{background:linear-gradient(135deg,var(--secondary),var(--secondary-dark));color:#fff}
        .btn-success{background:linear-gradient(135deg,var(--success),var(--success-dark));color:#fff}
        .btn-danger{background:linear-gradient(135deg,var(--danger),var(--danger-dark));color:#fff}
        .btn-warning{background:linear-gradient(135deg,var(--warning),var(--warning-dark));color:#fff}
        button:active{transform:translateY(-1px)}
        .historial{padding:35px;background:var(--bg);max-height:380px;overflow-y:auto}
        .historial h3{margin-bottom:30px;color:var(--text);font-size:1.3em;text-align:center;font-weight:700}
        .item{padding:25px;margin-bottom:18px;background:var(--card);border-radius:22px;border-left:8px solid var(--primary);box-shadow:var(--shadow-sm);transition:all .3s;position:relative;overflow:hidden}
        .item::before{content:'';position:absolute;left:0;top:0;height:100%;width:4px;background:linear-gradient(to bottom,var(--primary),transparent)}
        .item:hover{transform:translateX(12px);box-shadow:var(--shadow-md)}
        .item.active{box-shadow:var(--shadow-lg);border-left-color:var(--danger)}
        .item .precio{font-size:2em;font-weight:900;color:var(--danger);margin-bottom:10px}
        .item .fecha{color:var(--text-muted);font-size:1.1em;font-weight:500}
        .empty-state{text-align:center;padding:80px;color:var(--text-muted);font-size:1.1em}
        .fab{position:fixed;bottom:30px;right:30px;width:70px;height:70px;border-radius:50%;background:var(--primary);border:none;color:#fff;font-size:1.5em;box-shadow:var(--shadow-lg);cursor:pointer;transition:all .3s;z-index:100}
        .fab:hover{transform:scale(1.1);box-shadow:0 15px 40px rgba(76,175,80,.4)}
        @media(max-width:480px){.container{border-radius:20px}.botones{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <div class="container">
        <header class="header-info">
            <div class="status" id="status">🚀 Listo</div>
            <div class="stats" id="stats">0 precios</div>
        </header>
        
        <div class="precio-actual">
            <div class="precio" id="precioActual">$0.00</div>
            <div class="fecha" id="fechaActual">Sin precios</div>
            <div class="tendencia" id="tendencia"></div>
        </div>

        <div class="formulario">
            <input id="nuevoPrecio" type="number" step="0.01" placeholder="💲 Nuevo precio por kg" autocomplete="off">
            <div class="botones">
                <button class="btn-primary" onclick="guardarPrecio()">💾 Guardar</button>
                <button class="btn-success" onclick="exportarJSON()">📤 Backup</button>
            </div>
            <div class="botones">
                <button class="btn-secondary" onclick="importarJSON()">📥 Restaurar</button>
                <button class="btn-danger" onclick="limpiarTodo()">🗑️ Limpiar</button>
            </div>
        </div>

        <div class="historial">
            <h3>📊 Historial Completo</h3>
            <div id="historialLista"></div>
        </div>
    </div>

    <button class="fab" onclick="scrollTop()" title="Arriba">↑</button>

    <script>
        const STORAGE_KEY = 'datos_azucar_pro_v2';
        let preciosAnteriores = [];

        // 🔄 Cargar datos mejorado
        function cargarPrecios() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                if (data) {
                    const parsed = JSON.parse(data);
                    preciosAnteriores = parsed.precios || [];
                    return parsed.precios || [];
                }
            } catch(e) {
                console.warn('Error parse:', e);
            }
            return [];
        }

        // 💾 Guardar con validación
        function guardarPrecios(precios) {
            try {
                const data = {
                    precios: precios.slice(0, 200), // Max 200
                    ultimoBackup: Date.now(),
                    version: '2.0',
                    totalGuardados: precios.length
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                return true;
            } catch(e) {
                alert('❌ Error guardando (localStorage lleno)');
                return false;
            }
        }

        // 📊 Calcular tendencia
        function calcularTendencia(precios) {
            if (precios.length < 2) return { texto: '', clase: '' };
            
            const actual = precios[0].precio;
            const anterior = precios[1].precio;
            const diff = actual - anterior;
            const pct = ((diff / anterior) * 100).toFixed(1);
            
            if (diff > 0) {
                return { 
                    texto: `+$${diff.toFixed(2)} (${pct}%)`, 
                    clase: 'subida',
                    icon: '📈'
                };
            } else if (diff < 0) {
                return { 
                    texto: `${diff.toFixed(2)} (${pct}%)`, 
                    clase: 'baja',
                    icon: '📉'
                };
            }
            return { texto: 'Sin cambio', clase: '', icon: '➡️' };
        }

        // 🎨 UI mejorada
        function actualizarUI() {
            const precios = cargarPrecios();
            const lista = document.getElementById('historialLista');
            
            document.getElementById('stats').textContent = `${precios.length} precios`;
            
            if (precios.length === 0) {
                document.getElementById('precioActual').textContent = '$0.00';
                document.getElementById('fechaActual').textContent = 'Sin precios';
                document.getElementById('tendencia').innerHTML = '';
                lista.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size:4em;margin-bottom:20px">🍚</div>
                        <div>¡Agrega tu primer precio!</div>
                    </div>
                `;
                return;
            }

            const ultimo = precios[0];
            document.getElementById('precioActual').textContent = `$${ultimo.precio.toFixed(2)}`;
            document.getElementById('fechaActual').textContent = formatearFecha(ultimo.fecha);
            
            const tendencia = calcularTendencia(precios);
            document.getElementById('tendencia').innerHTML = `
                <span class="tendencia ${tendencia.clase}">
                    ${tendencia.icon} ${tendencia.texto}
                </span>
            `;

            lista.innerHTML = precios.slice(0, 25).map((p, i) => {
                const esUltimo = i === 0;
                const tiempo = Date.now() - p.fecha;
                const labelTiempo = tiempo < 60000 ? 'Ahora' : 
                                  tiempo < 3600000 ? `${Math.round(tiempo/60000)}min` :
                                  `${Math.round(tiempo/3600000)}h`;
                
                return `
                    <div class="item ${esUltimo ? 'active' : ''}">
                        <div class="precio">$${p.precio.toFixed(2)}</div>
                        <div class="fecha">${formatearFecha(p.fecha)} <span style="color:var(--text-muted);font-size:.9em">${labelTiempo}</span></div>
                    </div>
                `;
            }).join('');
        }

        function formatearFecha(ms) {
            return new Intl.DateTimeFormat('es-PE', {
                day: '2-digit', month: 'short', 
                hour: '2-digit', minute: '2-digit'
            }).format(new Date(ms));
        }

        // 💾 Guardar mejorado
        async function guardarPrecio() {
            const input = document.getElementById('nuevoPrecio');
            const precio = parseFloat(input.value?.trim());
            
            if (isNaN(precio) || precio <= 0 || precio > 1000) {
                input.style.borderColor = 'var(--danger)';
                input.placeholder = 'Precio válido (0.01 - 1000)';
                setTimeout(() => {
                    input.style.borderColor = '#e9ecef';
                    input.placeholder = '💲 Nuevo precio por kg';
                }, 2500);
                return;
            }

            const precios = cargarPrecios();
            const nuevo = { precio, fecha: Date.now() };
            precios.unshift(nuevo);
            
            if (guardarPrecios(precios)) {
                input.value = '';
                input.blur();
                actualizarUI();
                
                // Feedback avanzado
                if ('vibrate' in navigator) {
                    navigator.vibrate([100, 50, 100]);
                }
                
                const audio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAo');
                audio.volume = 0.3;
                audio.play().catch(() => {});
                
                document.getElementById('status').textContent = `✅ ${nuevo.precio.toFixed(2)} guardado`;
                setTimeout(() => document.getElementById('status').textContent = '🚀 Listo', 3000);
            }
        }

        // 📤 Export/Import mejorados
        function exportarJSON() {
            const precios = cargarPrecios();
            const data = {
                precios,
                meta: {
                    exportado: new Date().toISOString(),
                    total: precios.length,
                    version: '2.0'
                }
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `azucar_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            document.getElementById('status').textContent = '📤 Backup creado';
        }

        function importarJSON() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json,application/json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        const precios = data.precios || data;
                        
                        if (Array.isArray(precios) && precios.length > 0) {
                            guardarPrecios(precios);
                            actualizarUI();
                            document.getElementById('status').textContent = `✅ ${precios.length} precios importados`;
                        } else {
                            throw new Error('No precios válidos');
                        }
                    } catch(error) {
                        alert('❌ Error: ' + (error.message || 'Archivo inválido'));
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function limpiarTodo() {
            if (confirm(`🗑️ Borrar ${cargarPrecios().length} precios?\n\n¡No se puede deshacer!`)) {
                localStorage.removeItem(STORAGE_KEY);
                actualizarUI();
                document.getElementById('status').textContent = '🗑️ Limpiado completamente';
            }
        }

        // UX Mejoras
        function scrollTop() {
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // Eventos
        document.getElementById('nuevoPrecio').addEventListener('keypress', e => {
            if (e.key === 'Enter') guardarPrecio();
        });

        // Auto-guardado cada 30s (prevent loss)
        setInterval(() => {
            if (document.hidden) return;
            actualizarUI();
        }, 30000);

        // Carga inicial
        window.addEventListener('load', actualizarUI);
        window.addEventListener('focus', actualizarUI);
    </script>
</body>
</html>
